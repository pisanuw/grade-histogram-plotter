<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Grade Histogram Plotter</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f4f7fb;
                color: #1f2937;
            }

            .page {
                max-width: 960px;
                margin: 0 auto;
                padding: 32px 20px 48px;
            }

            .card {
                background: #fff;
                border-radius: 18px;
                box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
                padding: 28px;
            }

            h1 {
                margin-top: 0;
                margin-bottom: 8px;
            }

            p {
                color: #4b5563;
                line-height: 1.5;
            }

            .error {
                padding: 12px 14px;
                border-radius: 12px;
                background: #fef2f2;
                color: #b91c1c;
                margin-bottom: 16px;
            }

            form {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 18px;
            }

            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 600;
            }

            textarea {
                width: 100%;
                min-height: 240px;
                box-sizing: border-box;
                padding: 14px;
                border: 1px solid #cbd5e1;
                border-radius: 14px;
                font: inherit;
                resize: vertical;
            }

            .actions {
                grid-column: 1 / -1;
            }

            button {
                border: 0;
                border-radius: 999px;
                background: #2563eb;
                color: #fff;
                padding: 12px 18px;
                font-weight: 700;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <main class="page">
            <section class="card">
                <h1>Grade Histogram Plotter</h1>
                <p>Enter one cutoff per line and one grade per line to build a histogram with summary statistics.</p>
                {% if error_message %}
                <div class="error">{{ error_message }}</div>
                {% endif %}
                <form method="post" action="/">
                    <div>
                        <label for="cutoffs">Cutoffs</label>
                        <textarea id="cutoffs" name="cutoffs" rows="6" cols="10">{{ default_cutoffs }}</textarea>
                    </div>
                    <div>
                        <label for="grades">Grades to plot</label>
                        <textarea id="grades" name="grades" rows="10" cols="10">{{ default_grades }}</textarea>
                    </div>
                    <div class="actions">
                        <button type="submit">Generate histogram</button>
                    </div>
                </form>
            </section>
        </main>
    </body>
</html>
