<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grade Histogram Plotter</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }

    h1 { margin-top: 0; }

    .error {
      background: #fee2e2;
      border: 1px solid #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-weight: 600;
      color: #991b1b;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      align-items: start;
    }

    label { font-weight: 600; display: block; margin-bottom: 4px; }

    textarea {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      resize: vertical;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin: 4px 0 0;
    }

    .file-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .file-row label {
      font-weight: normal;
      font-size: 13px;
      margin: 0;
      color: #6b7280;
    }

    input[type="file"] { font-size: 13px; }

    .submit-row {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Grade Histogram Plotter</h1>

      {% if error_message %}
      <p class="error">{{ error_message }}</p>
      {% endif %}

      <form method="post" action="/" enctype="multipart/form-data" id="main-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid">
          <div>
            <label for="cutoffs">Cutoffs</label>
            <textarea id="cutoffs" name="cutoffs" rows="7">{{ default_cutoffs }}</textarea>
            <p class="hint">One per line,<br>ascending order</p>
          </div>
          <div>
            <label for="grades">Grades</label>
            <textarea id="grades" name="grades" rows="12">{{ default_grades }}</textarea>
            <p class="hint" id="grade-count"></p>
            <div class="file-row">
              <label for="grades_file">Or upload a .txt / .csv file:</label>
              <input type="file" id="grades_file" name="grades_file" accept=".txt,.csv">
            </div>
          </div>
        </div>
        <div class="submit-row">
          <button type="submit" id="submit-btn">Plot Histogram</button>
          <span class="hint">Ctrl+Enter / &#8984;+Enter to submit</span>
        </div>
      </form>
    </section>
  </main>

  <script>
    const gradesTA = document.getElementById('grades');
    const countEl  = document.getElementById('grade-count');
    const form      = document.getElementById('main-form');
    const submitBtn = document.getElementById('submit-btn');

    function updateCount() {
      const lines = gradesTA.value.replace(/,|\t/g, '\n').split('\n').filter(x => x.trim());
      countEl.textContent = lines.length + ' grade' + (lines.length !== 1 ? 's' : '') + ' entered';
    }

    gradesTA.addEventListener('input', updateCount);
    updateCount();

    form.addEventListener('submit', function () {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Plotting\u2026';
    });

    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        submitBtn.click();
      }
    });
  </script>
</body>
</html>
