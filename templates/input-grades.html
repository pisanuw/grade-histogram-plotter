<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grade Histogram Plotter</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }

    h1 { margin-top: 0; }

    .error {
      background: #fee2e2;
      border: 1px solid #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-weight: 600;
      color: #991b1b;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      align-items: start;
    }

    label {
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }

    textarea {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      resize: vertical;
    }

    button {
      margin-top: 20px;
      padding: 10px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Grade Histogram Plotter</h1>

      {% if error_message %}
      <p class="error">{{ error_message }}</p>
      {% endif %}

      <form method="post" action="/">
        <div class="form-grid">
          <div>
            <label for="cutoffs">Cutoffs</label>
            <textarea id="cutoffs" name="cutoffs" rows="7" cols="10">{{ default_cutoffs }}</textarea>
            <p class="hint">One per line,<br>ascending order</p>
          </div>
          <div>
            <label for="grades">Grades</label>
            <textarea id="grades" name="grades" rows="12" cols="20">{{ default_grades }}</textarea>
            <p class="hint">One per line, or comma/tab separated</p>
          </div>
        </div>
        <button type="submit">Plot Histogram</button>
      </form>
    </section>
  </main>
</body>
</html>
