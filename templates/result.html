<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grade Histogram Plotter</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #1f2937;
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .card {
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        padding: 28px;
        margin-bottom: 20px;
      }

      h1, h2 { margin-top: 0; }

      .warning {
        background: #fef3c7;
        border: 1px solid #f59e0b;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-weight: 600;
        color: #92400e;
      }

      .chart-wrap {
        position: relative;
        max-width: 800px;
        margin: 0 auto 24px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
        gap: 12px;
        margin: 0 0 24px;
      }

      .stat-box {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 12px 8px;
        text-align: center;
      }

      .stat-label {
        font-size: 11px;
        color: #6b7280;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .stat-value {
        font-size: 20px;
        font-weight: 700;
        margin-top: 4px;
        color: #1f2937;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button, .btn {
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        border: none;
        display: inline-block;
      }

      .btn-primary { background: #2563eb; color: #fff; }
      .btn-primary:hover { background: #1d4ed8; }
      .btn-secondary { background: #f1f5f9; color: #1f2937; border: 1px solid #d1d5db; }
      .btn-secondary:hover { background: #e2e8f0; }

      details { margin-top: 4px; }

      summary {
        cursor: pointer;
        font-weight: 600;
        color: #2563eb;
        list-style: none;
        padding: 4px 0;
        user-select: none;
      }

      summary::-webkit-details-marker { display: none; }
      summary::before { content: "▶ "; font-size: 11px; }
      details[open] summary::before { content: "▼ "; }

      .edit-grid {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 16px;
        margin-top: 16px;
        align-items: start;
      }

      label { font-weight: 600; display: block; margin-bottom: 4px; }

      textarea {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-family: monospace;
        font-size: 14px;
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Histogram Result</h1>

        {% if nan_count %}
        <p class="warning">{{ nan_count }} non-numeric value(s) were ignored.</p>
        {% endif %}

        <div class="chart-wrap">
          <canvas id="myChart"></canvas>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Total</div>
            <div class="stat-value">{{ stats.total }}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Mean</div>
            <div class="stat-value">{{ stats.mean }}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Median</div>
            <div class="stat-value">{{ stats.median }}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Stdev</div>
            <div class="stat-value">{{ stats.stdev }}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Min</div>
            <div class="stat-value">{{ stats.min }}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Max</div>
            <div class="stat-value">{{ stats.max }}</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="downloadChart()">Download PNG</button>
          <a class="btn btn-secondary" href="/">New histogram</a>
        </div>
      </section>

      <section class="card">
        <details>
          <summary>Edit inputs &amp; replot</summary>
          <form method="post" action="/" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="edit-grid">
              <div>
                <label for="cutoffs">Cutoffs</label>
                <textarea id="cutoffs" name="cutoffs" rows="7">{{ cutoffs_text }}</textarea>
              </div>
              <div>
                <label for="grades">Grades</label>
                <textarea id="grades" name="grades" rows="12">{{ grades_text }}</textarea>
              </div>
            </div>
            <div class="actions" style="margin-top: 16px;">
              <button type="submit" class="btn btn-primary">Replot</button>
            </div>
          </form>
        </details>
      </section>
    </main>

    <script type="application/json" id="chart-data">
      {"labels": {{ chart_data.labels | tojson }}, "counts": {{ chart_data.counts | tojson }}}
    </script>
    <script type="application/json" id="stats-data">
      {{ stats | tojson }}
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script>
      const chartData = JSON.parse(document.getElementById('chart-data').textContent);
      const stats     = JSON.parse(document.getElementById('stats-data').textContent);
      const canvas    = document.getElementById('myChart');

      new Chart(canvas, {
        type: 'bar',
        data: {
          labels: chartData.labels,
          datasets: [{
            label: '# of Students',
            data: chartData.counts,
            backgroundColor: 'rgba(37, 99, 235, 0.75)',
            borderColor: 'rgba(37, 99, 235, 1)',
            borderWidth: 1,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => ` ${ctx.parsed.y} student${ctx.parsed.y !== 1 ? 's' : ''}`
              }
            }
          },
          scales: {
            x: { title: { display: true, text: 'Grade Range', font: { weight: 'bold' } } },
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1 },
              title: { display: true, text: '# of Students', font: { weight: 'bold' } }
            }
          }
        }
      });

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function downloadChart() {
        const w = canvas.width;
        const h = canvas.height;
        const off = document.createElement('canvas');
        off.width  = w;
        off.height = h;
        const ctx = off.getContext('2d');

        // White background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);

        // Chart
        ctx.drawImage(canvas, 0, 0);

        // Stats box (top-left, matching old matplotlib style)
        const lines = [
          `Total:  ${stats.total}`,
          `Mean:   ${stats.mean}`,
          `Median: ${stats.median}`,
          `Stdev:  ${stats.stdev}`,
          `Min:    ${stats.min}`,
          `Max:    ${stats.max}`,
          `Dist:   [${stats.distribution.join(', ')}]`,
          `Pct:    [${stats.percentages.join(', ')}]`,
        ];

        const fontSize   = Math.round(h * 0.028);
        const lineH      = Math.round(fontSize * 1.5);
        const pad        = Math.round(fontSize * 0.8);
        ctx.font         = `${fontSize}px monospace`;
        const maxW       = Math.max(...lines.map(l => ctx.measureText(l).width));
        const boxW       = maxW + pad * 2;
        const boxH       = lines.length * lineH + pad * 2;
        const boxX       = Math.round(w * 0.07);
        const boxY       = Math.round(h * 0.06);

        ctx.save();
        ctx.fillStyle    = 'rgba(245, 222, 179, 0.85)'; // wheat
        roundRect(ctx, boxX, boxY, boxW, boxH, 6);
        ctx.fill();
        ctx.strokeStyle  = 'rgba(180, 140, 80, 0.9)';
        ctx.lineWidth    = 1;
        roundRect(ctx, boxX, boxY, boxW, boxH, 6);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle    = '#000000';
        ctx.font         = `${fontSize}px monospace`;
        lines.forEach((line, i) => {
          ctx.fillText(line, boxX + pad, boxY + pad + fontSize + i * lineH);
        });

        const a = document.createElement('a');
        a.href = off.toDataURL('image/png');
        a.download = 'histogram.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    </script>
  </body>
</html>
