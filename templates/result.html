<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grade Histogram Plotter</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #1f2937;
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .card {
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }

      h1 {
        margin-top: 0;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 20px auto;
      }

      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Histogram Result</h1>
        {{ plot_data | safe }}
        <p><a href="/">Create another histogram</a></p>
      </section>
    </main>
  </body>
</html>
